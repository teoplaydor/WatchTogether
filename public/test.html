<!DOCTYPE html>
<html>
<head><title>TURN Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
<h2>TURN Server Test</h2>
<pre id="log"></pre>
<div id="videos" style="display:flex;gap:10px;flex-wrap:wrap;margin-top:20px;"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const log = (m) => { document.getElementById('log').textContent += m + '\n'; };

async function run() {
  log('Connecting...');
  const s1 = io(), s2 = io();
  await Promise.all([new Promise(r=>s1.on('connect',r)), new Promise(r=>s2.on('connect',r))]);

  const rd = await new Promise(r=>s1.emit('create-room',{nickname:'T1',avatar:'😎'},r));
  log('Room: '+rd.roomCode);
  const ice = rd.iceServers;
  log('Servers: '+ice.length);
  ice.forEach(s=>log('  '+s.urls+(s.username?' ('+s.username+')':'')));
  await new Promise(r=>s2.emit('join-room',{code:rd.roomCode,nickname:'T2',avatar:'🐱'},r));

  const c=document.createElement('canvas');c.width=320;c.height=240;
  const ctx=c.getContext('2d');let f=0;
  setInterval(()=>{ctx.fillStyle=`hsl(${f++%360},80%,50%)`;ctx.fillRect(0,0,320,240);ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.fillText('F'+f,120,125);},33);
  const stream=c.captureStream(30);

  // Test TURN-only (relay forced)
  log('\n--- TURN-only (relay forced) ---');
  const turnServers = ice.filter(s=>s.urls.includes('turn'));
  const result = await test(s1,s2,stream,turnServers,'relay');
  log('Result: '+result);

  if(result==='OK') log('\n*** TURN WORKS! Cross-network streaming will work. ***');
  else {
    log('\n--- Trying each TURN server individually ---');
    for(const srv of turnServers) {
      log('\nTesting: '+srv.urls);
      const r = await test(s1,s2,stream,[srv],'relay');
      log('  -> '+r);
    }
  }
  log('\nDone.');
}

function test(s1,s2,stream,servers,policy) {
  return new Promise(resolve => {
    const cfg = {iceServers:servers};
    if(policy) cfg.iceTransportPolicy=policy;
    const p1=new RTCPeerConnection(cfg), p2=new RTCPeerConnection(cfg);
    let resolved=false, connected=false;

    const done = (result) => { if(!resolved){resolved=true; p1.close();p2.close(); s1.off('ice-candidate',ih1);s2.off('ice-candidate',ih2);s2.off('call-offer',oh);s1.off('call-answer',ah); resolve(result);} };

    p1.onicecandidate=e=>{if(e.candidate)s1.emit('ice-candidate',{to:s2.id,candidate:e.candidate});};
    p2.onicecandidate=e=>{if(e.candidate)s2.emit('ice-candidate',{to:s1.id,candidate:e.candidate});};
    const ih1=async({from,candidate})=>{if(candidate&&from===s2.id)try{await p1.addIceCandidate(candidate);}catch(e){}};
    const ih2=async({from,candidate})=>{if(candidate&&from===s1.id)try{await p2.addIceCandidate(candidate);}catch(e){}};
    s1.on('ice-candidate',ih1); s2.on('ice-candidate',ih2);

    p2.oniceconnectionstatechange=()=>{
      log('  ICE: '+p2.iceConnectionState);
      if(p2.iceConnectionState==='connected'||p2.iceConnectionState==='completed'){connected=true;done('OK');}
      if(p2.iceConnectionState==='failed')done('FAILED');
    };
    p2.ontrack=e=>{
      log('  Track received: '+e.track.kind);
      const v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.muted=true;
      v.style.cssText='width:160px;height:120px;border:2px solid lime;';
      v.srcObject=new MediaStream([e.track]);v.play().catch(()=>{});
      document.getElementById('videos').appendChild(v);
    };
    stream.getTracks().forEach(t=>p1.addTrack(t,stream));
    const oh=async({from,offer})=>{if(from!==s1.id)return;await p2.setRemoteDescription(offer);const a=await p2.createAnswer();await p2.setLocalDescription(a);s2.emit('call-answer',{to:from,answer:a});};
    const ah=async({from,answer})=>{if(from!==s2.id)return;await p1.setRemoteDescription(answer);};
    s2.on('call-offer',oh); s1.on('call-answer',ah);
    p1.createOffer().then(o=>p1.setLocalDescription(o).then(()=>s1.emit('call-offer',{to:s2.id,offer:o})));
    setTimeout(()=>done('TIMEOUT'),20000);
  });
}

run().catch(e=>log('ERROR: '+e));
</script>
</body>
</html>
