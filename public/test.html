<!DOCTYPE html>
<html>
<head><title>TURN Server Test</title></head>
<body style="background:#111;color:#0f0;font-family:monospace;padding:20px;">
<h2>TURN Server Test (forced relay)</h2>
<pre id="log"></pre>
<div id="videos" style="display:flex;gap:10px;margin-top:20px;"></div>
<script src="/socket.io/socket.io.js"></script>
<script>
const log = (msg) => { document.getElementById('log').textContent += msg + '\n'; };

async function runTest() {
  log('=== TURN Relay Test ===');

  const sock1 = io();
  const sock2 = io();
  await Promise.all([
    new Promise(r => sock1.on('connect', r)),
    new Promise(r => sock2.on('connect', r))
  ]);
  log('Sockets connected');

  // Get TURN credentials from server
  const roomData = await new Promise(r => {
    sock1.emit('create-room', { nickname: 'T1', avatar: '😎' }, r);
  });
  log('Room: ' + roomData.roomCode);

  const iceServers = roomData.iceServers;
  log('ICE servers from server:');
  iceServers.forEach(s => log('  ' + JSON.stringify(s)));

  await new Promise(r => {
    sock2.emit('join-room', { code: roomData.roomCode, nickname: 'T2', avatar: '🐱' }, r);
  });

  // Create canvas stream
  const c = document.createElement('canvas'); c.width=320; c.height=240;
  const ctx = c.getContext('2d');
  let f=0;
  setInterval(()=>{ctx.fillStyle=`hsl(${f++%360},80%,50%)`;ctx.fillRect(0,0,320,240);ctx.fillStyle='#fff';ctx.font='20px monospace';ctx.fillText('F'+f,120,125);},33);
  const stream = c.captureStream(30);

  // TEST 1: STUN only (should work on localhost)
  log('\n--- Test 1: STUN only ---');
  const r1 = await testConnection(sock1, sock2, stream, [{ urls: 'stun:stun.l.google.com:19302' }]);
  log('STUN result: ' + r1);

  // TEST 2: TURN only (forced relay — iceTransportPolicy: relay)
  log('\n--- Test 2: TURN only (forced relay) ---');
  const turnOnly = iceServers.filter(s => s.urls.startsWith('turn:'));
  log('TURN servers: ' + turnOnly.length);
  const r2 = await testConnection(sock1, sock2, stream, turnOnly, 'relay');
  log('TURN result: ' + r2);

  // TEST 3: All servers (STUN + TURN)
  log('\n--- Test 3: STUN + TURN ---');
  const r3 = await testConnection(sock1, sock2, stream, iceServers);
  log('STUN+TURN result: ' + r3);

  log('\n=== DONE ===');
  if (r2 === 'CONNECTED') {
    log('TURN WORKS! Screen share should work across networks.');
  } else {
    log('TURN FAILED. Need different TURN servers.');
  }
}

function testConnection(sock1, sock2, stream, iceServers, policy) {
  return new Promise((resolve) => {
    const config = { iceServers };
    if (policy) config.iceTransportPolicy = policy;

    const pc1 = new RTCPeerConnection(config);
    const pc2 = new RTCPeerConnection(config);

    let gotTrack = false;

    pc1.onicecandidate = e => {
      if (e.candidate) sock1.emit('ice-candidate', { to: sock2.id, candidate: e.candidate });
    };
    pc2.onicecandidate = e => {
      if (e.candidate) sock2.emit('ice-candidate', { to: sock1.id, candidate: e.candidate });
    };

    const icHandler1 = async ({ from, candidate }) => {
      if (candidate && from === sock2.id) try { await pc1.addIceCandidate(candidate); } catch(e) {}
    };
    const icHandler2 = async ({ from, candidate }) => {
      if (candidate && from === sock1.id) try { await pc2.addIceCandidate(candidate); } catch(e) {}
    };
    sock1.on('ice-candidate', icHandler1);
    sock2.on('ice-candidate', icHandler2);

    pc1.oniceconnectionstatechange = () => log('  PC1 ICE: ' + pc1.iceConnectionState);
    pc2.oniceconnectionstatechange = () => {
      log('  PC2 ICE: ' + pc2.iceConnectionState);
      if (pc2.iceConnectionState === 'connected' || pc2.iceConnectionState === 'completed') {
        // Check selected candidate type
        pc2.getStats().then(stats => {
          stats.forEach(s => {
            if (s.type === 'candidate-pair' && s.state === 'succeeded') {
              log('  Candidate pair: local=' + s.localCandidateId + ' remote=' + s.remoteCandidateId);
            }
            if (s.type === 'local-candidate' && s.candidateType) {
              log('  Local candidate: ' + s.candidateType + ' ' + (s.address||'') + ':' + (s.port||''));
            }
          });
        });
      }
    };

    pc2.ontrack = (e) => {
      gotTrack = true;
      log('  GOT TRACK: ' + e.track.kind);
      const v = document.createElement('video');
      v.autoplay=true; v.playsInline=true; v.muted=true;
      v.style.cssText='width:160px;height:120px;border:2px solid lime;';
      v.srcObject = new MediaStream([e.track]);
      v.play().catch(()=>{});
      document.getElementById('videos').appendChild(v);
    };

    stream.getTracks().forEach(t => pc1.addTrack(t, stream));

    const offerHandler = async ({ from, offer }) => {
      if (from !== sock1.id) return;
      await pc2.setRemoteDescription(new RTCSessionDescription(offer));
      const answer = await pc2.createAnswer();
      await pc2.setLocalDescription(answer);
      sock2.emit('call-answer', { to: from, answer });
    };
    const answerHandler = async ({ from, answer }) => {
      if (from !== sock2.id) return;
      await pc1.setRemoteDescription(new RTCSessionDescription(answer));
    };
    sock2.on('call-offer', offerHandler);
    sock1.on('call-answer', answerHandler);

    pc1.createOffer().then(o => pc1.setLocalDescription(o).then(() => {
      sock1.emit('call-offer', { to: sock2.id, offer: o });
    }));

    setTimeout(() => {
      sock1.off('ice-candidate', icHandler1);
      sock2.off('ice-candidate', icHandler2);
      sock2.off('call-offer', offerHandler);
      sock1.off('call-answer', answerHandler);
      pc1.close(); pc2.close();
      if (pc2.iceConnectionState === 'connected' || pc2.iceConnectionState === 'completed') {
        resolve('CONNECTED');
      } else {
        resolve('FAILED (' + pc2.iceConnectionState + ')');
      }
    }, 15000);
  });
}

runTest().catch(e => log('ERROR: ' + e.message));
</script>
</body>
</html>
